<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Trip to Japan? — The things guidebooks don't tell you</title>
<meta name="description" content="80 real-life scenarios that teach you unwritten Japanese customs. Know the culture, enjoy it more.">
<meta property="og:title" content="Trip to Japan?">
<meta property="og:description" content="The things guidebooks don't tell you. A little cultural charm to make your trip smoother.">
<meta property="og:type" content="website">
<meta property="og:url" content="https://trip-to-japan.app">
<meta property="og:image" content="https://trip-to-japan.app/og-image.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=DM+Serif+Display&display=swap" rel="stylesheet">
<style>
  :root {
    --vermillion: #D4513B;
    --vermillion-dark: #C84535;
    --vermillion-glow: rgba(212, 81, 59, 0.15);
    --ink: #1a1a1a;
    --ink-secondary: #6b7280;
    --ink-tertiary: #9ca3af;
    --paper: #FAFAF8;
    --paper-warm: #FFF5F2;
    --card: #ffffff;
    --border: #e5e5e3;
    --success: #059669;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'DM Sans', system-ui, -apple-system, sans-serif;
    background: var(--paper);
    color: var(--ink);
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
  }

  /* === HERO === */
  .hero {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 2rem 1.5rem;
    position: relative;
    overflow: hidden;
    background: linear-gradient(180deg, var(--paper-warm) 0%, var(--paper) 40%);
  }

  /* Subtle decorative circles */
  .hero::before,
  .hero::after {
    content: '';
    position: absolute;
    border-radius: 50%;
    opacity: 0.04;
    background: var(--vermillion);
    pointer-events: none;
  }
  .hero::before {
    width: 500px; height: 500px;
    top: -200px; right: -150px;
  }
  .hero::after {
    width: 350px; height: 350px;
    bottom: -100px; left: -120px;
  }

  .hero-content {
    position: relative;
    z-index: 1;
    max-width: 440px;
    animation: fadeUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) both;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* Omamori icon */
  .omamori {
    width: 120px;
    height: 120px;
    margin: 0 auto 1.5rem;
    animation: fadeUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) 0.1s both;
  }
  .omamori img {
    width: 100%;
    height: 100%;
    object-fit: contain;
    filter: drop-shadow(0 8px 24px var(--vermillion-glow));
  }

  .hero h1 {
    font-family: 'DM Serif Display', serif;
    font-size: 2.75rem;
    font-weight: 400;
    color: var(--ink);
    letter-spacing: -0.02em;
    line-height: 1.1;
    margin-bottom: 1rem;
    animation: fadeUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) 0.15s both;
  }

  .hero .tagline {
    font-size: 1.125rem;
    line-height: 1.6;
    color: var(--ink-secondary);
    margin-bottom: 0.5rem;
    animation: fadeUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) 0.25s both;
  }

  .hero .sub {
    font-size: 0.9375rem;
    color: var(--ink-tertiary);
    margin-bottom: 2.5rem;
    animation: fadeUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) 0.3s both;
  }

  /* === APP STORE BADGE === */
  .store-badge {
    animation: fadeUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) 0.4s both;
    margin-bottom: 0.75rem;
  }

  .store-badge a {
    display: inline-block;
    transition: transform 0.15s ease, opacity 0.15s ease;
  }

  .store-badge a:hover {
    transform: scale(1.05);
    opacity: 0.9;
  }

  .store-badge a:active {
    transform: scale(0.97);
  }

  .store-badge img {
    height: 54px;
  }

  .store-note {
    font-size: 0.8125rem;
    color: var(--ink-tertiary);
    animation: fadeUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) 0.45s both;
  }

  /* === FEATURES === */
  .features {
    display: flex;
    gap: 1rem;
    justify-content: center;
    flex-wrap: wrap;
    margin-top: 2.5rem;
    animation: fadeUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) 0.5s both;
  }

  .pill {
    display: inline-flex;
    align-items: center;
    gap: 0.375rem;
    padding: 0.5rem 0.875rem;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 999px;
    font-size: 0.8125rem;
    color: var(--ink-secondary);
    font-weight: 500;
  }

  /* === FOOTER === */
  .footer {
    text-align: center;
    padding: 2rem 1.5rem;
    font-size: 0.8125rem;
    color: var(--ink-tertiary);
    border-top: 1px solid var(--border);
  }
  .footer a {
    color: var(--ink-tertiary);
    text-decoration: none;
    transition: color 0.2s;
  }
  .footer a:hover { color: var(--vermillion); }
  .footer .copy {
    margin-top: 0.75rem;
    font-size: 0.75rem;
  }

  /* === RESPONSIVE === */
  @media (max-width: 480px) {
    .hero h1 { font-size: 2.25rem; }
    .omamori { width: 100px; height: 100px; }
  }
</style>
</head>
<body>

<section class="hero">
  <div class="hero-content">
    <div class="omamori">
      <img src="/icon.png" alt="Trip to Japan? omamori icon" width="120" height="120">
    </div>

    <h1>Trip to Japan?</h1>

    <p class="tagline">The things guidebooks don't tell you.</p>
    <p class="sub">80 real-life scenarios. Free to start, no account needed.</p>

    <div class="store-badge">
      <a href="https://apps.apple.com/app/id6760936750" target="_blank" rel="noopener">
        <img src="https://tools.applemediaservices.com/api/badges/download-on-the-app-store/black/en-us" alt="Download on the App Store" height="54">
      </a>
    </div>
    <p class="store-note">Free on iOS</p>

    <div class="features">
      <span class="pill">🎌 80 quiz scenarios</span>
      <span class="pill">🧠 Learn the "why"</span>
      <span class="pill">🗾 Trip countdown</span>
      <span class="pill">✨ Free to start</span>
    </div>
  </div>
</section>

<footer class="footer">
  <a href="/">Trip to Japan?</a> · <a href="/privacy">Privacy</a> · <a href="/terms">Terms</a> · <a href="/support">Support</a>
  <div class="copy">© 2026 Trip to Japan?</div>
</footer>

</body>
</html>
