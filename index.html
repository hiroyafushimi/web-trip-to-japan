<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Trip to Japan? — Travel Tips & Manners Guide</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=DM+Serif+Display&display=swap" rel="stylesheet">
<style>
  :root {
    --vermillion: #D4513B;
    --vermillion-light: #F9EBE8;
    --ink: #1a1a1a;
    --ink-secondary: #6b7280;
    --paper: #FAFAF8;
    --border: #e5e5e3;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'DM Sans', system-ui, sans-serif;
    background: var(--paper);
    color: var(--ink);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 2rem;
    -webkit-font-smoothing: antialiased;
  }
  .logo {
    font-family: 'DM Serif Display', serif;
    font-size: 2.5rem;
    color: var(--vermillion);
    margin-bottom: 0.5rem;
  }
  .tagline {
    font-size: 1.125rem;
    color: var(--ink-secondary);
    margin-bottom: 2rem;
    max-width: 400px;
  }
  .cta {
    display: inline-block;
    background: var(--vermillion);
    color: white;
    padding: 0.875rem 2rem;
    border-radius: 12px;
    text-decoration: none;
    font-weight: 600;
    font-size: 1rem;
    transition: background 0.2s;
  }
  .cta:hover { background: #A33D2B; }
  .links {
    margin-top: 3rem;
    font-size: 0.8125rem;
    color: var(--ink-secondary);
  }
  .links a {
    color: var(--ink-secondary);
    text-decoration: none;
    margin: 0 0.5rem;
  }
  .links a:hover { color: var(--vermillion); }
</style>
</head>
<body>
  <div class="logo">Trip to Japan?</div>
  <p class="tagline">Learn Japanese etiquette before you go. 41 real-life scenarios to help you travel with confidence.</p>
  <a href="#" class="cta">Coming Soon on the App Store</a>
  <div class="links">
    <a href="/privacy">Privacy</a> · <a href="/terms">Terms</a> · <a href="/support">Support</a>
  </div>
</body>
</html>
